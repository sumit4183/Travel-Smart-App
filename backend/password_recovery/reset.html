            background-color: white;
            padding: 20px;

            width: 100%;

            margin-bottom: 10px;

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }

</head>

        <h1>Password Reset</h1>

            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required>
